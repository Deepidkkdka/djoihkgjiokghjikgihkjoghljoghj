
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: #ff3366;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 20px;
        }

        #heart-box {
            font-family: monospace;
            font-size: 8px;
            line-height: 8px;
            white-space: pre;
            text-shadow: 0 0 5px #ff3366;
        }

        .letter {
            opacity: 0;
            display: inline-block;
            animation: appear 1s forwards;
        }

        @keyframes appear {
            to { opacity: 1; }
        }

        .photo-container {
            position: relative;
            width: 320px;
            height: 420px;
            background: #1a1a1a;
            border-radius: 20px;
            border: 2px solid #ff3366;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            color: #444;
            text-align: center;
            padding: 20px;
        }

        .love-text {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>

<script>
    const heartBox = document.getElementById('heart-box');
    const phrase = "ILOVEU";
    
    function buildHeart() {
        let charIndex = 0;
        let content = "";
        
        for (let y = 15; y > -15; y--) {
            let line = "";
            for (let x = -30; x < 30; x++) {
                let formula = Math.pow(Math.pow(x * 0.045, 2) + Math.pow(y * 0.1, 2) - 1, 3) - Math.pow(x * 0.045, 2) * Math.pow(y * 0.1, 3);
                
                if (formula <= 0) {
                    let char = phrase[charIndex % phrase.length];
                    line += `<span class="letter" style="animation-delay: ${charIndex * 0.003}s">${char}</span>`;
                    charIndex++;
                } else {
                    line += " ";
                }
            }
            content += line + "<br>";
        }
        heartBox.innerHTML = content;
    }

    buildHeart();
</script>
